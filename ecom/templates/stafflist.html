<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Cards</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 20px;
  }

  .card-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); /* slightly bigger cards */
    gap: 20px;
    justify-items: center;
  }

  .card {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    transition: transform 0.3s, box-shadow 0.3s;
    width: 100%;
    max-width: 280px; /* increased max-width */
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
  }

  .card h3 {
    margin: 0 0 10px 0;
    color: #0d6efd;
    font-size: 16px;
    text-align: center;
    width: 100%;
  }

  .card p {
    margin: 6px 0;
    font-size: 13px;
    color: #333;
    width: 100%;
  }

  .card p strong {
    color: #000;
  }

  .btn-group {
    margin-top: 15px;
    display: flex;
    gap: 10px;
    width: 100%;
    justify-content: space-between;
  }

  .btn {
    text-decoration: none;
    font-size: 13px;
    font-weight: bold;
    padding: 6px 10px;
    border-radius: 6px;
    transition: 0.3s;
    display: flex;
    align-items: center;
    gap: 5px;
    justify-content: center;
    flex: 1;
  }

  .btn-update {
    background: #ffc107;
    color: #212529;
  }
  .btn-update:hover {
    background: #e0a800;
  }

  .btn-delete {
    background: #dc3545;
    color: #fff;
  }
  .btn-delete:hover {
    background: #b02a37;
  }

  @media (max-width: 1200px) {
    .card-container {
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    }
  }

  @media (max-width: 768px) {
    .card-container {
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    }
  }

  @media (max-width: 480px) {
    .card-container {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
  <div class="card-container">
    {% for i in a %}
    <div class="card">
      <h3><i class="fa-solid fa-id-card"></i> {{i.staff_id}}</h3>
      <p><strong><i class="fa-solid fa-user"></i> Name:</strong> {{i.name}}</p>
      <p><strong><i class="fa-solid fa-user-tag"></i> Username:</strong> {{i.username}}</p>
      <p><strong><i class="fa-solid fa-envelope"></i> Email:</strong> {{i.email}}</p>
      <p><strong><i class="fa-solid fa-lock"></i> Password:</strong> {{i.password}}</p>
      <div class="btn-group">
        <a href="/updatestaff/{{i.staff_id}}" class="btn btn-update"><i class="fa-solid fa-pen"></i> Update</a>
        <a href="/deletestaff/{{i.staff_id}}" class="btn btn-delete"><i class="fa-solid fa-trash"></i> Delete</a>
      </div>
    </div>
    {% endfor %}
  </div>
</body>
</html>
