<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Styled Links</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      gap: 20px;
    }

    a {
      text-decoration: none;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    /* Vendor button */
    a.vendor {
      background: #ff9800;
    }

    /* Staff button */
    a.staff {
      background: #4caf50;
    }

    /* Product button */
    a.product {
      background: #2196f3;
    }

    /* Hover effect */
    a:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 12px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>
  <a href="/vendoragain" class="vendor">
    <i class="fa-solid fa-store"></i> Vendors
  </a>
  <a href="/staffagain" class="staff">
    <i class="fa-solid fa-users"></i> Staff
  </a>
  <a href="/product_log" class="product">
    <i class="fa-solid fa-box"></i> Product
  </a>
</body>
</html>
