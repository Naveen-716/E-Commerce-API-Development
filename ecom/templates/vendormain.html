<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Management</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: "Poppins", sans-serif;
      margin: 0;
      padding: 0;
      background: #f0f2f5;
    }

    /* Top navbar */
    nav {
      background: #0d6efd;
      color: #fff;
      padding: 15px 30px;
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    nav i {
      margin-right: 10px;
    }

    /* Main container */
    .container {
      max-width: 1000px;
      margin: 50px auto;
      text-align: center;
    }

    .container h1 {
      font-size: 32px;
      font-weight: 700;
      color: #333;
      margin-bottom: 10px;
    }

    .container p {
      font-size: 15px;
      color: #666;
      margin-bottom: 40px;
    }

    /* Menu grid */
    .menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
    }

    .menu a {
      text-decoration: none;
      color: white;
      padding: 25px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .menu a i {
      font-size: 30px;
    }

    /* Colors */
    .menu a.existing { background: #6f42c1; }
    .menu a.add { background: #198754; }
    .menu a.view { background: #0d6efd; }

    /* Hover */
    .menu a:hover {
      transform: translateY(-6px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>
  <nav>
    <i class="fa-solid fa-briefcase"></i> Vendor Management
  </nav>

  <div class="container">
    <h1>Welcome to Vendor Management</h1>
    <div class="menu">
      <a href="/vendor_log" class="existing">
        <i class="fa-solid fa-warehouse"></i>
        Existing Vendors
      </a>
      <a href="/vendorlog" class="add">
        <i class="fa-solid fa-user-plus"></i>
        Add New Vendors
      </a>
      <a href="/vendorview" class="view">
        <i class="fa-solid fa-eye"></i>
        View Current Vendors
      </a>
    </div>
  </div>
</body>
</html>
