<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Styled Product Cards</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f1f3f6;
    margin: 0;
    padding: 20px;
  }

  /* Grid layout */
  .container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }

  /* Card */
  .card {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    min-height: 300px; /* reduced from 360px */
    overflow: hidden;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
  }

  /* Image box */
  .img-box {
    width: 100%;
    height: 160px; /* reduced from 200px */
    display: flex;
    justify-content: center;
    align-items: center;
    background: #fff;
    overflow: hidden;
  }

  .img-box img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    transition: transform 0.3s ease;
  }

  .card:hover .img-box img {
    transform: scale(1.05);
  }

  /* Card content */
  .card-content {
    padding: 10px; /* slightly reduced padding */
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  .name {
    font-size: 14px; /* slightly smaller */
    font-weight: 600;
    color: #212121;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .rating {
    font-size: 12px; /* slightly smaller */
    color: #ffb400;
    margin-bottom: 4px;
  }

  .price-section {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-bottom: 8px;
  }

  .price-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .price {
    font-size: 15px;
    font-weight: bold;
    color: #212121;
  }

  .original-price {
    font-size: 12px;
    color: #878787;
    text-decoration: line-through;
  }

  .discount {
    font-size: 12px;
    color: #388e3c;
    font-weight: bold;
  }

  .vendor-info {
    font-size: 11px;
    color: #555;
    line-height: 1.2;
    white-space: normal;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Buttons */
  .btn-group {
    display: flex;
    gap: 8px;
    margin-top: auto;
  }

  .btn-group a {
    text-decoration: none;
    flex: 1;
  }

  .card button {
    width: 100%;
    border: none;
    padding: 8px; /* reduced padding */
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .update {
    background: #ffc107;
    color: #212121;
  }

  .delete {
    background: #dc3545;
    color: #fff;
  }

  .card button:hover {
    opacity: 0.9;
  }
</style>

</head>
<body>
  <div class="container">
    {% for i in s %}
    <div class="card">
      <div class="img-box">
        <img src="{{i.image.url}}" alt="{{i.product_name}}">
      </div>
      <div class="card-content">
        <div class="name">{{i.product_name}}</div>
        <div class="rating">
          <i class="fa-solid fa-star"></i>
          <i class="fa-solid fa-star"></i>
          <i class="fa-solid fa-star"></i>
          <i class="fa-solid fa-star-half-stroke"></i>
          <i class="fa-regular fa-star"></i>
        </div>
        <div class="price-section">
          <span class="price">₹{{i.price}}</span>
          <span class="discount">{{i.discount}} 0% off</span>
           <div class="vendor-info">{{ i.vendor_product_brand }} {{ i.vendor_name }}</div>
        </div>
        <div class="btn-group">
          <a href="/updateproduct/{{i.product_id}}">
            <button class="update"><i class="fa-solid fa-pen"></i> Update</button>
          </a>
          <a href="/deleteproduct/{{i.product_id}}" onclick="return confirm('Are you sure you want to delete this product?');">
            <button class="delete"><i class="fa-solid fa-trash"></i> Delete</button>
          </a>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</body>
</html>
